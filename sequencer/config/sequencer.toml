bind = "0.0.0.0:9443"
tls_cert = "/etc/jpm-onyx/certs/sequencer.crt"
tls_key = "/etc/jpm-onyx/certs/sequencer.key"
ring_capacity = 65536   # must be power of 2

# -----------------------------------------------------------------------------
# Instruments — each pinned to its own core, one Chainweb chain per id
# -----------------------------------------------------------------------------
[[instruments]]
id = "BTC-PERP"
class = "crypto"
chain_id = 3
tick_size = 0.5
lot_size = 0.001
max_leverage = 20
cpu_pin = 4

[[instruments]]
id = "ETH-PERP"
class = "crypto"
chain_id = 4
tick_size = 0.25
lot_size = 0.01
max_leverage = 20
cpu_pin = 5

[[instruments]]
id = "SOL-PERP"
class = "crypto"
chain_id = 5
tick_size = 0.05
lot_size = 0.1
max_leverage = 10
cpu_pin = 6

[[instruments]]
