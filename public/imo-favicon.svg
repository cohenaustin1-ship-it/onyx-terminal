<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Solid black square favicon — designed for sharp rendering at 16×16, 32×32 favicon sizes -->
  <rect width="64" height="64" rx="10" fill="#000000"/>
  <!-- IMO wordmark in white, centered. Letters are drawn as a single text element
       with a wide-cap font stack so it stays legible even at 16x16 in the tab. -->
  <text x="32" y="44"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="28"
        font-weight="700"
        letter-spacing="-1"
        text-anchor="middle"
        fill="#FFFFFF">IMO</text>
</svg>
